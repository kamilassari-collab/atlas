<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas — tes offres, avant tout le monde</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=switzer@300,400,500,600,700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* quiet-luxury monochrome: warm paper, near-black ink, earthy tiers */
    --paper:  #FAF8F4;
    --panel:  #F1EEE7;
    --card:   #FFFFFF;
    --ink:    #16161A;   /* near-black: primary buttons, headings */
    --tx:     #26262B;
    --tx-2:   #6B6B73;
    --muted:  #9B9AA0;
    --line:   #E7E3DA;
    --line-2: #F0ECE4;
    /* the only color in the UI: desaturated score tiers */
    --hi:  #4F7A5E;  /* sage  */
    --mid: #9A6F2E;  /* amber */
    --lo:  #9C5544;  /* clay  */
    /* legacy aliases so inline JS keeps working */
    --green: #4F7A5E; --amber: #9A6F2E; --red: #9C5544;
    --violet: #16161A; --text: #16161A;
    --side: #16161A; --side-tx: #C9C7C1; --side-mut: #76757B;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Switzer', sans-serif; background: var(--paper); color: var(--tx);
    min-height: 100vh; display: flex; -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01";
  }
  ::selection { background: rgba(22,22,26,0.10); }
  :focus-visible { outline: 1.5px solid var(--ink); outline-offset: 2px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation:none!important; transition:none!important; } }

  code {
    font-family: 'Switzer', monospace; font-weight: 600; font-size: 0.92em;
    background: rgba(22,22,26,0.06); color: var(--ink); padding: 1px 6px; border-radius: 5px;
  }

  /* ── SIDEBAR ─────────────────────────────────────────── */
  .sidebar {
    width: 228px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; z-index: 2;
    background: var(--side); color: var(--side-tx);
    display: flex; flex-direction: column; padding: 30px 20px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px; padding: 0 6px; margin-bottom: 4px;
    font-size: 21px; font-weight: 600; letter-spacing: -0.02em; color: #F6F3EC;
  }
  .logo-mk { color: #F6F3EC; flex-shrink: 0; opacity: 0.95; }
  .logo-sub {
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 600;
    color: var(--side-mut); padding: 0 6px; margin-bottom: 36px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 11px; width: 100%; text-align: left;
    background: none; border: none; cursor: pointer; color: var(--side-tx);
    font-family: 'Switzer'; font-size: 14px; font-weight: 500;
    padding: 9px 12px; border-radius: 8px; margin-bottom: 2px;
    transition: background 0.16s, color 0.16s; position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #F6F3EC; }
  .nav-item.active { background: rgba(255,255,255,0.07); color: #F8F5EE; }
  .nav-item svg { opacity: 0.82; }
  .nav-count {
    margin-left: auto; font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums;
    color: var(--side-mut); background: rgba(255,255,255,0.07); padding: 1px 8px; border-radius: 20px;
  }
  .sidebar-tip {
    margin-top: auto; font-size: 12px; line-height: 1.65; color: var(--side-mut);
    padding: 15px 14px; border: 1px solid rgba(255,255,255,0.09); border-radius: 9px;
  }
  .sidebar-tip b { color: var(--side-tx); font-weight: 600; }
  .sidebar-tip code { background: rgba(255,255,255,0.10); color: #E9E6DF; }

  /* ── MAIN ────────────────────────────────────────────── */
  .main { flex: 1; min-width: 0; }
  .view { display: none; }
  .view.active { display: block; animation: fadeUp 0.4s ease both; }

  .hero { padding: 44px 48px 20px; }
  .hero-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
  h1 { font-size: 33px; font-weight: 600; line-height: 1.08; letter-spacing: -0.025em; color: var(--ink); }
  h1 em { font-style: normal; color: var(--tx-2); font-weight: 500; }
  .hero-sub {
    display: flex; align-items: center; gap: 9px; margin-top: 14px;
    font-size: 13px; color: var(--tx-2); font-weight: 500;
  }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--hi); animation: pulse 2.6s infinite; flex-shrink: 0; }
  .hint { font-size: 12.5px; color: var(--tx-2); white-space: nowrap; padding-top: 7px; }

  /* funnel band — the real metrics, not vanity scores */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); margin-top: 30px;
           border: 1px solid var(--line); border-radius: 13px; overflow: hidden; background: var(--card); }
  .stat { padding: 17px 20px; border-left: 1px solid var(--line-2); }
  .stat:first-child { border-left: none; }
  .stat-n { font-size: 27px; font-weight: 600; line-height: 1; letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums; color: var(--ink); }
  .stat-l { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
            margin-top: 8px; font-weight: 600; }

  /* ── FILTERS ─────────────────────────────────────────── */
  .filters { display: flex; align-items: center; gap: 9px; padding: 22px 48px; }
  .fchip { font-family: 'Switzer'; font-size: 13px; font-weight: 500; color: var(--tx-2);
           background: none; border: 1px solid var(--line); border-radius: 20px; padding: 6px 15px;
           cursor: pointer; transition: all 0.15s; }
  .fchip:hover { border-color: var(--ink); color: var(--ink); }
  .fchip.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .fsep { width: 1px; height: 22px; background: var(--line); margin: 0 4px; }
  .fsel { font-family: 'Switzer'; font-size: 13px; font-weight: 500; color: var(--tx-2);
          background: none; border: none; border-bottom: 1px solid var(--line); padding: 6px 22px 6px 4px;
          cursor: pointer; outline: none; appearance: none; -webkit-appearance: none;
          background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239B9AA0' stroke-width='1.3' fill='none'/%3E%3C/svg%3E");
          background-repeat: no-repeat; background-position: right 4px center; }
  .fsel:hover { border-color: var(--ink); color: var(--ink); }
  .fcount { margin-left: auto; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── GEN BANNER ──────────────────────────────────────── */
  .gen-banner { display: none; align-items: center; gap: 10px; margin: 0 48px; padding: 11px 16px;
                background: var(--card); border: 1px solid var(--line); border-left: 2px solid var(--ink);
                border-radius: 8px; color: var(--tx); font-size: 13px; font-weight: 500; }
  .gen-banner-x { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--muted);
                  font-size: 17px; line-height: 1; padding: 0 2px; transition: color 0.15s; }
  .gen-banner-x:hover { color: var(--ink); }

  /* ── FEED (aligned ledger) ───────────────────────────── */
  .feed { padding: 8px 48px 56px; }
  .card { display: grid; grid-template-columns: minmax(0,1fr) 60px 150px 86px 92px 112px;
          align-items: center; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--line-2);
          animation: fadeUp 0.4s ease both; transition: background 0.16s; position: relative; }
  .feed .card:first-child { border-top: 1px solid var(--line); }
  .card:hover { background: linear-gradient(90deg, rgba(22,22,26,0.018), transparent 90%); }
  .card > .btn, .card > .gen-pending, .card > select.status { width: 100%; }

  .cinfo { min-width: 0; }
  .ctitle-row { display: flex; align-items: baseline; gap: 9px; margin-bottom: 4px; flex-wrap: wrap; }
  .ctitle { font-size: 15.5px; font-weight: 600; color: var(--ink); text-decoration: none; line-height: 1.28; letter-spacing: -0.006em; }
  a.ctitle:hover { text-decoration: underline; text-underline-offset: 3px; }
  .new-badge { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
               color: var(--hi); flex-shrink: 0; position: relative; top: -1px; }
  .cmeta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ccompany { font-size: 13px; color: var(--tx); font-weight: 600; }
  .cdot { color: var(--line); }
  .cloc { font-size: 12.5px; color: var(--tx-2); }
  .chip { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
          border: 1px solid var(--line); padding: 2px 7px; border-radius: 5px; flex-shrink: 0; }
  .creason { font-size: 12.5px; color: var(--tx-2); margin-top: 7px; line-height: 1.45; }

  /* score: quiet number + tier dot */
  .score { justify-self: center; display: inline-flex; align-items: center; gap: 7px;
           font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--ink); }
  .score::before { content: ''; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .score.s-high::before { background: var(--hi); }  .score.s-high { color: var(--hi); }
  .score.s-mid::before  { background: var(--mid); }
  .score.s-low::before  { background: var(--lo); }

  select.status { font-family: 'Switzer'; font-size: 12.5px; font-weight: 500; color: var(--tx-2);
                  background: none; border: 1px solid var(--line); border-radius: 7px; padding: 7px 9px;
                  cursor: pointer; outline: none; transition: all 0.14s; appearance: none; -webkit-appearance: none;
                  background-image: url("data:image/svg+xml,%3Csvg width='9' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3.5 3.5L8 1' stroke='%239B9AA0' stroke-width='1.3' fill='none'/%3E%3C/svg%3E");
                  background-repeat: no-repeat; background-position: right 8px center; padding-right: 22px; }
  select.status:hover { border-color: var(--ink); color: var(--ink); }

  .btn { border: 1px solid var(--line); border-radius: 7px; padding: 7px 11px; font-family: 'Switzer';
         font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
         display: inline-flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; color: var(--tx); }
  .btn svg { flex-shrink: 0; }
  .btn-gen { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-gen:hover { background: #000; }
  .btn-doc { background: none; color: var(--ink); border-color: var(--line); }
  .btn-doc:hover { background: var(--panel); border-color: var(--ink); }
  .btn-apply { background: none; color: var(--tx); border-color: var(--line); }
  .btn-apply:hover { background: var(--ink); border-color: var(--ink); color: var(--paper); }
  .gen-pending { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px;
                 font-weight: 500; color: var(--tx-2); border: 1px solid var(--line); border-radius: 7px; padding: 7px 10px; white-space: nowrap; }
  .spinner { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1.6px solid var(--line);
             border-top-color: var(--ink); animation: spin 0.7s linear infinite; }
  .btn-span2 { grid-column: span 2; }

  /* ── EMPTY / SKELETON ────────────────────────────────── */
  .empty { text-align: center; padding: 88px 20px; animation: fadeUp 0.5s ease both; }
  .empty-icon { display: inline-flex; margin-bottom: 20px; color: var(--line); }
  .empty h2 { font-size: 22px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
  .empty p { font-size: 14px; color: var(--tx-2); margin-top: 11px; line-height: 1.7; }
  .skel { height: 62px; border-bottom: 1px solid var(--line-2); position: relative; overflow: hidden; }
  .skel::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.022), transparent);
                 background-size: 200% 100%; animation: shimmer 1.5s infinite; }

  /* ── KANBAN ──────────────────────────────────────────── */
  .board { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(220px, 1fr); gap: 13px; padding: 8px 48px 56px; overflow-x: auto; }
  .col { background: rgba(22,22,26,0.014); border: 1px solid var(--line-2); border-radius: 11px; padding: 12px; min-height: 320px; transition: background 0.16s, border-color 0.16s; }
  .col.dragover { background: rgba(22,22,26,0.04); border-color: var(--ink); }
  .col-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 12px; }
  .col-title { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--tx); }
  .col-dot { width: 7px; height: 7px; border-radius: 50%; }
  .col-count { font-size: 11px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }
  .col-cards { display: flex; flex-direction: column; gap: 9px; }
  .kcard { background: var(--card); border: 1px solid var(--line); border-radius: 9px; padding: 12px 13px; cursor: grab; transition: box-shadow 0.16s, transform 0.16s, border-color 0.16s; }
  .kcard:hover { border-color: var(--ink); box-shadow: 0 6px 18px rgba(22,22,26,0.06); }
  .kcard.dragging { opacity: 0.5; transform: rotate(1.5deg); }
  .kco { font-size: 11.5px; color: var(--tx-2); font-weight: 600; }
  .kti { font-size: 13.5px; color: var(--ink); font-weight: 600; margin: 4px 0 10px; line-height: 1.3; }
  .kfoot { display: flex; align-items: center; gap: 9px; }
  .ksc { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .kdocs { display: flex; gap: 6px; }
  .kdocs a { font-size: 10px; font-weight: 700; letter-spacing: 0.03em; color: var(--ink); text-decoration: none; border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; }
  .kdocs a:hover { background: var(--panel); }
  .kdt { margin-left: auto; font-size: 11px; color: var(--muted); }
  .col-empty { text-align: center; color: var(--line); font-size: 13px; padding: 26px 0; }

  /* ── TOAST ───────────────────────────────────────────── */
  #toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px);
           background: var(--ink); color: var(--paper); font-size: 13px; font-weight: 500; padding: 12px 18px;
           border-radius: 9px; box-shadow: 0 12px 36px rgba(22,22,26,0.22); opacity: 0; pointer-events: none;
           transition: all 0.28s cubic-bezier(.2,.8,.2,1); z-index: 50; max-width: 440px; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast code { background: rgba(255,255,255,0.14); color: #F4EFE4; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(79,122,94,0.45); } 70% { box-shadow: 0 0 0 6px rgba(79,122,94,0); } 100% { box-shadow: 0 0 0 0 rgba(79,122,94,0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

  @media (max-width: 980px) {
    .sidebar { display: none; }
    .hero, .filters, .feed, .board { padding-left: 20px; padding-right: 20px; }
    .gen-banner { margin-left: 20px; margin-right: 20px; }
    h1 { font-size: 27px; }
    .card { grid-template-columns: 56px 1fr 1fr 100px; grid-auto-rows: auto; row-gap: 13px; }
    .cinfo { grid-column: 1 / -1; }
    .score { grid-row: 2; justify-self: start; }
    .status { grid-row: 2; }
    .btn-span2 { grid-column: span 2; }
    .btn-apply { grid-row: 2; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <svg class="logo-mk" width="21" height="21" viewBox="0 0 22 22" fill="none" aria-hidden="true">
      <circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="1.4"/>
      <ellipse cx="11" cy="11" rx="4.2" ry="9" stroke="currentColor" stroke-width="1.4"/>
      <line x1="2.2" y1="11" x2="19.8" y2="11" stroke="currentColor" stroke-width="1.4"/>
    </svg>Atlas
  </div>
  <div class="logo-sub" id="logo-sub">Job command center</div>
  <button class="nav-item active" id="nav-feed" onclick="showView('feed')">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0">
      <rect x="1" y="2" width="12" height="1.6" rx="0.8" fill="currentColor"/>
      <rect x="1" y="6.2" width="9" height="1.6" rx="0.8" fill="currentColor"/>
      <rect x="1" y="10.4" width="10.5" height="1.6" rx="0.8" fill="currentColor"/>
    </svg>
    <span id="nav-feed-label">Offres</span> <span class="nav-count" id="count-feed">–</span>
  </button>
  <button class="nav-item" id="nav-board" onclick="showView('board')">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0">
      <rect x="1" y="1" width="3.4" height="12" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/>
      <rect x="9.6" y="1" width="3.4" height="8" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/>
    </svg>
    <span id="nav-board-label">Candidatures</span> <span class="nav-count" id="count-board">–</span>
  </button>
  <div class="sidebar-tip" id="sidebar-tip">
    Tape <code>/atlas</code> dans Claude Code pour rafraîchir tes offres.<br/><br/>
    Tes meilleurs matchs arrivent avec <b>CV + lettre déjà prêts</b>.
  </div>
</aside>

<main class="main">

  <!-- ── FEED VIEW ── -->
  <section id="view-feed" class="view active">
    <div class="hero">
      <div class="hero-row">
        <div>
          <h1 id="hero-feed">Tes offres, <em>avant tout le monde.</em></h1>
          <div class="hero-sub"><div class="pulse"></div><span id="freshness-label">…</span></div>
        </div>
        <div class="hint" id="hint">Rafraîchir : <code>/atlas</code> dans Claude Code</div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="filters">
      <button class="fchip active" data-min="0" id="fchip-all">Toutes</button>
      <button class="fchip" data-min="80">80+</button>
      <button class="fchip" data-min="65">65+</button>
      <div class="fsep"></div>
      <select class="fsel" id="f-city" aria-label="Filtrer par ville"><option value="">Toutes les villes</option></select>
      <select class="fsel" id="f-type" aria-label="Filtrer par contrat"><option value="">Tous contrats</option></select>
      <span class="fcount" id="f-count"></span>
    </div>
    <div class="gen-banner" id="gen-banner">
      <span id="gen-banner-text"></span>
      <button class="gen-banner-x" onclick="document.getElementById('gen-banner').style.display='none'" aria-label="Fermer">×</button>
    </div>
    <div class="feed" id="feed">
      <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    </div>
  </section>

  <!-- ── KANBAN VIEW ── -->
  <section id="view-board" class="view">
    <div class="hero">
      <div class="hero-row">
        <div>
          <h1 id="hero-board">Où tu en es, <em>partout.</em></h1>
          <div class="hero-sub"><span id="board-summary"></span></div>
        </div>
      </div>
    </div>
    <div class="board" id="board"></div>
  </section>

</main>

<div id="toast" role="status" aria-live="polite"></div>

<script>
// Bilingual: auto-detect from the browser/OS locale. English by default,
// French for anyone whose machine is set to French.
const LANG = (navigator.language || "en").toLowerCase().startsWith("fr") ? "fr" : "en";
const T = {
  en: {
    title: "Atlas, your roles before everyone else",
    navSub: "Job command center", navFeed: "Roles", navBoard: "Applications",
    tip1: 'Type <code>/atlas</code> in Claude Code to refresh your roles.',
    tip2: 'Your best matches arrive with <b>CV + cover letter ready</b>.',
    heroFeed: 'Your roles, <em>before everyone else.</em>',
    hint: 'Refresh: <code>/atlas</code> in Claude Code',
    heroBoard: 'Where you stand, <em>everywhere.</em>',
    boardSub: (n) => `${n} application${n > 1 ? "s" : ""} in progress`,
    fAll: "All", allCities: "All cities", allTypes: "All types",
    statFresh: "new · 24h", statTodo: "to apply", statApplied: "applied", statItw: "interviewing",
    freshLabel: (f, ago) => `${f} new role${f > 1 ? "s" : ""} (<24h) · updated ${ago}`,
    noJobs: "no roles yet. Type /atlas in Claude Code",
    genBanner: (n) => `${n} role${n > 1 ? "s" : ""} being prepared. CV and letter on the way.`,
    fcount: (n) => `${n} role${n > 1 ? "s" : ""}`,
    emptyTitle: "Your radar is ready.",
    emptyBody: 'Type <code>/atlas</code> in Claude Code.<br/>Atlas finds roles from the last 24h, scores them, and preps your best CVs.',
    serverDown: "Server not found", serverDownBody: 'Restart Atlas: type <code>/atlas</code> in Claude Code.',
    newBadge: "New", generate: "Generate", preparing: "Preparing…", apply: "Apply", cv: "CV", letter: "Letter", letterShort: "CL",
    updateFail: "Update failed. Try again.",
    genToast: 'Queued. Just tell Atlas: <code>prep that one</code>, the CV and letter will appear here.',
    agoNow: "just now", agoH: (h) => `${h}h ago`, agoYest: "yesterday", agoD: (d) => `${d}d ago`,
    contracts: { "full-time": "Full-time", "part-time": "Part-time", "internship": "Internship", "alternance": "Apprenticeship", "werkstudent": "Werkstudent", "contract": "Contract", "freelance": "Freelance" },
    cols: { todo: "To apply", applied: "Applied", interview_1: "Interview 1", interview_2: "Interview 2+", offer: "Offer", rejected: "Rejected" },
    statuses: [["queued", "To apply"], ["applied", "Applied"], ["interview_1", "Interview 1"], ["interview_2", "Interview 2+"], ["offer", "Offer"], ["rejected", "Rejected"], ["paused", "Paused"]],
  },
  fr: {
    title: "Atlas, tes offres avant tout le monde",
    navSub: "Centre de candidatures", navFeed: "Offres", navBoard: "Candidatures",
    tip1: 'Tape <code>/atlas</code> dans Claude Code pour rafraîchir tes offres.',
    tip2: 'Tes meilleurs matchs arrivent avec <b>CV + lettre déjà prêts</b>.',
    heroFeed: 'Tes offres, <em>avant tout le monde.</em>',
    hint: 'Rafraîchir : <code>/atlas</code> dans Claude Code',
    heroBoard: 'Où tu en es, <em>partout.</em>',
    boardSub: (n) => `${n} candidature${n > 1 ? "s" : ""} en cours`,
    fAll: "Toutes", allCities: "Toutes les villes", allTypes: "Tous contrats",
    statFresh: "nouvelles · 24h", statTodo: "à postuler", statApplied: "postulé", statItw: "en entretien",
    freshLabel: (f, ago) => `${f} nouvelle${f > 1 ? "s" : ""} offre${f > 1 ? "s" : ""} (<24h) · actualisé ${ago}`,
    noJobs: "aucune offre. Tape /atlas dans Claude Code",
    genBanner: (n) => `${n} offre${n > 1 ? "s" : ""} en préparation. CV et lettre arrivent.`,
    fcount: (n) => `${n} offre${n > 1 ? "s" : ""}`,
    emptyTitle: "Le radar est prêt.",
    emptyBody: 'Tape <code>/atlas</code> dans Claude Code.<br/>Atlas trouve les offres des dernières 24h, les score, et prépare tes meilleurs CV.',
    serverDown: "Serveur introuvable", serverDownBody: 'Relance Atlas : tape <code>/atlas</code> dans Claude Code.',
    newBadge: "Nouveau", generate: "Générer", preparing: "Préparation…", apply: "Postuler", cv: "CV", letter: "Lettre", letterShort: "LM",
    updateFail: "Échec de la mise à jour. Réessaie.",
    genToast: 'Demandé. Dis simplement à Atlas : <code>prépare celui-là</code>, le CV et la lettre apparaîtront ici.',
    agoNow: "à l'instant", agoH: (h) => `il y a ${h}h`, agoYest: "hier", agoD: (d) => `il y a ${d}j`,
    contracts: { "full-time": "CDI", "part-time": "Temps partiel", "internship": "Stage", "alternance": "Alternance", "werkstudent": "Werkstudent", "contract": "CDD", "freelance": "Freelance" },
    cols: { todo: "À postuler", applied: "Postulé", interview_1: "Entretien 1", interview_2: "Entretien 2+", offer: "Offre", rejected: "Refusé" },
    statuses: [["queued", "À postuler"], ["applied", "Postulé"], ["interview_1", "Entretien 1"], ["interview_2", "Entretien 2+"], ["offer", "Offre reçue"], ["rejected", "Refusé"], ["paused", "En pause"]],
  },
}[LANG];

const CONTRACT_LABEL = T.contracts;
const COLUMNS = [
  { key: "todo",        label: T.cols.todo,        dot: "#9B9AA0", statuses: ["queued", "generation_requested", "cv_tailored", "cover_letter_done"] },
  { key: "applied",     label: T.cols.applied,     dot: "#4F7A5E", statuses: ["applied"] },
  { key: "interview_1", label: T.cols.interview_1, dot: "#9A6F2E", statuses: ["interview_1"] },
  { key: "interview_2", label: T.cols.interview_2, dot: "#16161A", statuses: ["interview_2"] },
  { key: "offer",       label: T.cols.offer,       dot: "#4F7A5E", statuses: ["offer"] },
  { key: "rejected",    label: T.cols.rejected,    dot: "#9C5544", statuses: ["rejected"] },
];
const COL_TARGET_STATUS = { todo: "queued", applied: "applied", interview_1: "interview_1", interview_2: "interview_2", offer: "offer", rejected: "rejected" };
const STATUS_OPTIONS = T.statuses;
const ARROW = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 7.5L7.5 2.5M4 2.5h3.5V6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const RADAR = `<svg width="44" height="44" viewBox="0 0 46 46" fill="none"><circle cx="23" cy="23" r="20" stroke="currentColor" stroke-width="1.2"/><circle cx="23" cy="23" r="12.5" stroke="currentColor" stroke-width="1.2"/><circle cx="23" cy="23" r="2.4" fill="currentColor"/><path d="M23 23L37 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;

let JOBS = [];
let loaded = false;
let filterMin = 0, filterCity = "", filterType = "";

const esc = s => (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const scoreClass = s => s >= 80 ? "s-high" : s >= 65 ? "s-mid" : "s-low";
const cityOf = j => (j.location || "").split(",")[0].trim();
const fileUrl = p => "/files/" + encodeURIComponent((p || "").split("/").pop());

function isNew(j) {
  const d = j.posted_at || j.scraped_at;
  return d && (Date.now() - new Date(d).getTime()) < 24 * 3600 * 1000;
}
function timeAgo(iso) {
  if (!iso) return "";
  const diff = Date.now() - new Date(iso).getTime();
  if (isNaN(diff)) return "";
  const h = Math.floor(diff / 3600000);
  if (h < 1) return T.agoNow;
  if (h < 24) return T.agoH(h);
  const dd = Math.floor(h / 24);
  return dd === 1 ? T.agoYest : T.agoD(dd);
}

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function load() {
  try {
    JOBS = (await api("/api/jobs")).filter(j => !["filtered_out", "new", "withdrawn"].includes(j.status));
    loaded = true;
    hydrateFilters();
    render();
  } catch (e) {
    if (!loaded) document.getElementById("feed").innerHTML =
      `<div class="empty"><div class="empty-icon">${RADAR}</div><h2>${T.serverDown}</h2>
       <p>${T.serverDownBody}</p></div>`;
  }
}

function hydrateFilters() {
  const cities = [...new Set(JOBS.map(cityOf).filter(Boolean))].sort();
  const types = [...new Set(JOBS.map(j => j.contract_type).filter(Boolean))].sort();
  const cs = document.getElementById("f-city"), ts = document.getElementById("f-type");
  const cv = cs.value, tv = ts.value;
  cs.length = 1; ts.length = 1;
  cities.forEach(c => cs.add(new Option(c, c)));
  types.forEach(t => ts.add(new Option(CONTRACT_LABEL[t] || t, t)));
  cs.value = cv; ts.value = tv;
}

function render() { renderStats(); renderFeed(); renderBoard(); }

function renderStats() {
  const fresh = JOBS.filter(isNew).length;
  const queued = JOBS.filter(j => COLUMNS[0].statuses.includes(j.status)).length;
  const applied = JOBS.filter(j => j.status === "applied").length;
  const interviewing = JOBS.filter(j => ["interview_1", "interview_2", "offer"].includes(j.status)).length;
  const tracked = applied + interviewing;
  const latest = JOBS.map(j => j.scraped_at).sort().pop();

  document.getElementById("freshness-label").textContent =
    JOBS.length ? T.freshLabel(fresh, timeAgo(latest)) : T.noJobs;
  document.getElementById("count-feed").textContent = JOBS.length;
  document.getElementById("count-board").textContent = tracked;
  document.getElementById("board-summary").textContent = T.boardSub(tracked);

  const pendingGen = JOBS.filter(j => j.status === "generation_requested").length;
  const banner = document.getElementById("gen-banner");
  if (pendingGen > 0) {
    document.getElementById("gen-banner-text").textContent = T.genBanner(pendingGen);
    banner.style.display = "flex";
  } else { banner.style.display = "none"; }

  // The funnel: what actually matters, not "80+ matches"
  document.getElementById("stats").innerHTML = [
    [fresh, T.statFresh],
    [queued, T.statTodo],
    [applied, T.statApplied],
    [interviewing, T.statItw],
  ].map(([n, l]) => `<div class="stat"><div class="stat-n">${n}</div><div class="stat-l">${l}</div></div>`).join("");
}

function renderFeed() {
  const feed = document.getElementById("feed");
  const rows = JOBS.filter(j =>
    j.relevance_score >= filterMin && (!filterCity || cityOf(j) === filterCity) && (!filterType || j.contract_type === filterType));
  document.getElementById("f-count").textContent = T.fcount(rows.length);

  if (!JOBS.length) {
    feed.innerHTML = `<div class="empty">
      <div class="empty-icon">${RADAR}</div>
      <h2>${T.emptyTitle}</h2>
      <p>${T.emptyBody}</p>
    </div>`;
    return;
  }

  feed.innerHTML = rows.map(j => {
    const sc = scoreClass(j.relevance_score);
    const cvCell = j.tailored_cv_path
      ? `<a class="btn btn-doc" href="${fileUrl(j.tailored_cv_path)}" target="_blank" aria-label="${T.cv}">${T.cv}</a>` : null;
    const letterCell = j.cover_letter_path
      ? `<a class="btn btn-doc" href="${fileUrl(j.cover_letter_path)}" target="_blank" aria-label="${T.letter}">${T.letter}</a>` : null;

    let actionCells;
    if (cvCell || letterCell) {
      actionCells = (cvCell || `<span></span>`) + (letterCell || `<span></span>`);
    } else if (j.status === "generation_requested") {
      actionCells = `<span class="gen-pending btn-span2"><span class="spinner"></span>${T.preparing}</span>`;
    } else {
      actionCells = `<button class="btn btn-gen btn-span2" onclick="requestGen(${j.id})">${T.generate}</button>`;
    }

    return `<div class="card ${sc}">
      <div class="cinfo">
        <div class="ctitle-row">
          <a class="ctitle" href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a>
          ${isNew(j) ? `<span class="new-badge">${T.newBadge}</span>` : ""}
        </div>
        <div class="cmeta">
          <span class="ccompany">${esc(j.company)}</span>
          ${cityOf(j) ? `<span class="cdot">·</span><span class="cloc">${esc(cityOf(j))}</span>` : ""}
          ${j.contract_type ? `<span class="chip">${esc(CONTRACT_LABEL[j.contract_type] || j.contract_type)}</span>` : ""}
        </div>
        ${j.score_reason ? `<div class="creason">${esc(j.score_reason)}</div>` : ""}
      </div>
      <div class="score ${sc}" title="Score de pertinence">${j.relevance_score}</div>
      <select class="status" aria-label="Statut" onchange="setStatus(${j.id}, this.value)">
        ${STATUS_OPTIONS.map(([v, l]) => `<option value="${v}" ${statusMatches(j.status, v) ? "selected" : ""}>${l}</option>`).join("")}
      </select>
      ${actionCells}
      <a class="btn btn-apply" href="${esc(j.url)}" target="_blank" rel="noopener" aria-label="${T.apply}">${T.apply} ${ARROW}</a>
    </div>`;
  }).join("");
}

function statusMatches(actual, opt) {
  if (opt === "queued") return ["queued", "generation_requested", "cv_tailored", "cover_letter_done"].includes(actual);
  return actual === opt;
}

function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = COLUMNS.map(col => {
    const cards = JOBS.filter(j => col.statuses.includes(j.status));
    return `<div class="col" data-col="${col.key}"
        ondragover="event.preventDefault(); this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')" ondrop="onDrop(event, '${col.key}')">
      <div class="col-head">
        <div class="col-title"><div class="col-dot" style="background:${col.dot}"></div>${col.label}</div>
        <div class="col-count">${cards.length}</div>
      </div>
      <div class="col-cards">
        ${cards.length ? cards.map(j => `
          <div class="kcard" draggable="true"
               ondragstart="event.dataTransfer.setData('text/plain', '${j.id}'); this.classList.add('dragging')"
               ondragend="this.classList.remove('dragging')">
            <div class="kco">${esc(j.company)}${cityOf(j) ? " · " + esc(cityOf(j)) : ""}</div>
            <div class="kti">${esc(j.title)}</div>
            <div class="kfoot">
              <span class="ksc" style="color:${j.relevance_score >= 80 ? "var(--hi)" : j.relevance_score >= 65 ? "var(--mid)" : "var(--lo)"}">${j.relevance_score}</span>
              <span class="kdocs">
                ${j.tailored_cv_path ? `<a href="${fileUrl(j.tailored_cv_path)}" target="_blank" title="${T.cv}">${T.cv}</a>` : ""}
                ${j.cover_letter_path ? `<a href="${fileUrl(j.cover_letter_path)}" target="_blank" title="${T.letter}">${T.letterShort}</a>` : ""}
              </span>
              <span class="kdt">${timeAgo(j.scraped_at)}</span>
            </div>
          </div>`).join("") : `<div class="col-empty">—</div>`}
      </div>
    </div>`;
  }).join("");
}

async function setStatus(id, status) {
  const j = JOBS.find(x => x.id === id);
  const prev = j ? j.status : null;
  if (j) { j.status = status; render(); }
  try {
    await api("/api/status", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id, status }) });
  } catch (e) {
    if (j && prev) { j.status = prev; render(); }
    toast(T.updateFail);
  }
}

async function requestGen(id) {
  await setStatus(id, "generation_requested");
  toast(T.genToast);
}

function onDrop(ev, colKey) {
  ev.preventDefault();
  document.querySelectorAll(".col").forEach(c => c.classList.remove("dragover"));
  const id = parseInt(ev.dataTransfer.getData("text/plain"), 10);
  if (id) setStatus(id, COL_TARGET_STATUS[colKey]);
}

function showView(v) {
  document.querySelectorAll(".view").forEach(x => x.classList.remove("active"));
  document.getElementById("view-" + v).classList.add("active");
  document.getElementById("nav-feed").classList.toggle("active", v === "feed");
  document.getElementById("nav-board").classList.toggle("active", v === "board");
}

let toastTimer;
function toast(html) {
  const t = document.getElementById("toast");
  t.innerHTML = html; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 5200);
}

document.querySelectorAll(".fchip").forEach(c => c.addEventListener("click", () => {
  document.querySelectorAll(".fchip").forEach(x => x.classList.remove("active"));
  c.classList.add("active"); filterMin = parseInt(c.dataset.min, 10); renderFeed();
}));
document.getElementById("f-city").addEventListener("change", e => { filterCity = e.target.value; renderFeed(); });
document.getElementById("f-type").addEventListener("change", e => { filterType = e.target.value; renderFeed(); });

// Apply the detected language to all the static page text.
function applyStaticI18n() {
  document.documentElement.lang = LANG;
  document.title = T.title;
  const set = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
  set("logo-sub", T.navSub);
  set("nav-feed-label", T.navFeed);
  set("nav-board-label", T.navBoard);
  set("sidebar-tip", T.tip1 + "<br/><br/>" + T.tip2);
  set("hero-feed", T.heroFeed);
  set("hero-board", T.heroBoard);
  set("hint", T.hint);
  set("fchip-all", T.fAll);
  const city = document.getElementById("f-city"); if (city && city.options[0]) city.options[0].textContent = T.allCities;
  const type = document.getElementById("f-type"); if (type && type.options[0]) type.options[0].textContent = T.allTypes;
}
applyStaticI18n();

load();
setInterval(load, 30000);
</script>
</body>
</html>
